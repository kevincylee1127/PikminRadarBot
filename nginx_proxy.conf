# ─────────────────────────────────────────────
# nginx_proxy.conf — Nginx 反向代理設定範例
#
# 用途：
#   在已運行 WordPress 的 Nginx 設定中，
#   新增此 location block 將 /pikmin/ 路徑轉發至 Docker 容器。
#
# 使用方式：
#   將以下 location block 貼入你的 server block（443 port）。
#   請勿覆蓋整個設定檔。
# ─────────────────────────────────────────────

# 在你現有的 server block 內新增此段：
# server {
#     listen 443 ssl;
#     server_name your-domain.com;
#     ... (WordPress 現有設定) ...

    location /pikmin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # 傳遞必要的 Header（LINE 簽章驗證需要原始 Host）
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 逾時設定（Overpass 查詢最多約 15 秒）
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;

        # 停用 buffering，讓 FastAPI 的 streaming response 即時傳回
        proxy_buffering off;
    }

# } # ← server block 結束
